<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Add Emergency Contact</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="Add Contacts.css">
</head>
<body>

  <div class="container">
    <h1>➕ Add Emergency Contact</h1>

    <form id="contactForm">
      <label>Name</label>
      <input type="text" id="name" placeholder="Enter name" required>

      <label>Phone Number</label>
      <input type="tel" id="phone" placeholder="Enter 10-digit number" aria-label="Enter your phone number" required>

      <label>Relation</label>
      <input type="text" id="relation" placeholder="Eg: Friend, Father" required>

      <button type="submit">Save Contact</button>
    </form>

    <a href="contacts.html" class="view-link">View Saved Contacts</a>
  </div>

  <script src="Add Contacts.js"></script>
</body>
</html>
